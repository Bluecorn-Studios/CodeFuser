<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeFuser</title>
    <meta name="description" content="CodeFuser - Premium growth infrastructure for businesses that deserve to be seen. Design, build, and deploy custom modern software and web applications." />
    
    <!-- Preload critical local self-hosted assets above the fold for maximum 2G/low-end performance -->
    <link rel="preload" href="/fonts/Satoshi-Regular.woff2" as="font" type="font/woff2" crossorigin="anonymous" fetchpriority="high" />
    <link rel="preload" href="/fonts/Satoshi-Medium.woff2" as="font" type="font/woff2" crossorigin="anonymous" fetchpriority="high" />
    <link rel="preload" href="/fonts/SpaceGrotesk-Bold.woff2" as="font" type="font/woff2" crossorigin="anonymous" fetchpriority="high" />
    <link rel="preload" href="/logo.svg" as="image" type="image/svg+xml" fetchpriority="high" />

    <!-- Preconnect to external third-party origins requested by performance audits -->
    <link rel="preconnect" href="https://placeholder-project.supabase.co" crossorigin />
    <link rel="preconnect" href="https://api.razorpay.com" crossorigin />
    <link rel="preconnect" href="https://checkout.razorpay.com" crossorigin />

    <!-- Critical CSS to prevent FOUC (Flash of Unstyled Content) -->
    <style>
      html, body {
        background-color: #000000;
        color: #F2E7FF;
        font-family: "Satoshi", "Inter", system-ui, sans-serif;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
      }
      #root {
        background-color: #000000;
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Lightweight loading skeleton shell while JS React bundle loads -->
      <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background-color: #000000; font-family: 'Space Grotesk', system-ui, sans-serif; color: #F2E7FF;">
        <div style="display: flex; flex-direction: column; align-items: center; gap: 20px; animation: fuserFadeIn 0.8s ease-out forwards; text-align: center;">
          <div style="font-size: 28px; font-weight: 700; letter-spacing: -0.01em; color: #ffffff; text-shadow: 0 0 16px rgba(242, 231, 255, 0.2);">
            CodeFuser
          </div>
          <div style="width: 24px; height: 24px; border: 2px solid rgba(242, 231, 255, 0.12); border-top-color: #F2E7FF; border-radius: 50%; animation: fuserSpin 0.7s linear infinite;"></div>
        </div>
      </div>
      <style>
        @keyframes fuserSpin {
          to { transform: rotate(360deg); }
        }
        @keyframes fuserFadeIn {
          from { opacity: 0; transform: translateY(8px); }
          to { opacity: 1; transform: translateY(0); }
        }
      </style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
